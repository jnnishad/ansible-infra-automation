---
# OS hardening baseline applied to every server: SSH lockdown, automatic
# security patching, fail2ban, and consistent NTP — matches the "Linux
# and Windows servers with strict uptime requirements" / "system
# hardening" work described across the Dolat Capital and Neosoft roles.

- name: Ensure required hardening packages are present
  ansible.builtin.package:
    name:
      - fail2ban
      - unattended-upgrades
      - chrony
      - auditd
    state: present

- name: Disable root SSH login
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin'
    line: 'PermitRootLogin no'
  when: hardening_disable_root_ssh
  notify: restart sshd

- name: Disable SSH password authentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication'
    line: 'PasswordAuthentication no'
  when: not hardening_password_auth
  notify: restart sshd

- name: Enable and start fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    enabled: true
    state: started
  when: hardening_fail2ban_enabled

- name: Enable unattended upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
    mode: "0644"
  when:
    - hardening_unattended_upgrades
    - ansible_os_family == "Debian"

- name: Configure chrony NTP servers
  ansible.builtin.template:
    src: chrony.conf.j2
    dest: /etc/chrony/chrony.conf
    mode: "0644"
  notify: restart chrony
  ignore_errors: "{{ ansible_check_mode }}"

- name: Set kernel hardening sysctl parameters
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_set: true
    state: present
    reload: true
  loop:
    - { key: "net.ipv4.conf.all.accept_redirects", value: "0" }
    - { key: "net.ipv4.conf.all.send_redirects", value: "0" }
    - { key: "net.ipv4.tcp_syncookies", value: "1" }
    - { key: "kernel.randomize_va_space", value: "2" }
