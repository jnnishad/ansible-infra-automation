name: Ansible Lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ansible-lint
        run: pip install ansible-lint ansible-core boto3

      - name: Run ansible-lint
        run: ansible-lint playbooks/ roles/

      - name: Syntax-check custom module
        run: python -m py_compile library/*.py
